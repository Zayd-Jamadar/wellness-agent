# Model variants to compare, all driving the SAME agent via provider.py.
# Only the provider/model (and optional api_base) change -> a fair side-by-side
# grid.
#
# Referenced from promptfooconfig.yaml / redteam.yaml via YAML anchors is not
# portable across promptfoo versions, so these are copied inline in each config.
# This file documents the canonical variant list.

- id: file://./provider.py
  label: gpt-5.4-mini
  config:
    provider: openai
    model: gpt-5.4-mini

