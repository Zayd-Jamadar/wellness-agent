# Evaluate with `promptfoo eval -c redteam.yaml` (NOT `redteam run`).
targets:
  - id: file://./provider.py
    label: gpt-5.4-mini
    config:
      model: openai/gpt-5.4-mini
  # OSS model on vLLM via the local LiteLLM proxy (see serving/). Scores the
  # SAME generated cases against the OSS model. Evaluate with `promptfoo eval`
  # (not `redteam run`) so this dataset is not regenerated.
  - id: file://./provider.py
    label: wellness-local (vLLM)
    config:
      model: openai/wellness-local
      api_base: http://localhost:4000
redteam:
