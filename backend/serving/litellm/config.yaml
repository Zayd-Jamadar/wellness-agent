# LiteLLM proxy: single OpenAI-compatible seam in front of the model backend.
# The app requests `wellness-local`; the proxy routes it to a local Ollama server.
# Everything is env-driven, so switching models or hosts = change .env only.
#
# Run: OLLAMA_API_BASE=http://localhost:11434 OLLAMA_MODEL=qwen2.5 \
#        litellm --config serving/litellm/config.yaml --port 4000

model_list:
  - model_name: wellness-local            # what the app requests (WELLNESS_MODEL)
    litellm_params:
      model: ollama/${OLLAMA_MODEL}        # e.g. ollama/qwen2.5
      api_base: os.environ/OLLAMA_API_BASE # e.g. http://localhost:11434

  # Point at any Ollama host (remote box, another container) by setting
  # OLLAMA_API_BASE accordingly - no app change needed.
